<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto.com | Customer Forensic Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cdc-blue: #0B3A82;
            --cdc-dark: #061121;
            --cdc-card: #0c1a2e;
            --cdc-border: #1a2a40;
            --cdc-text: #ffffff;
            --cdc-dim: #8fa2b3;
            --cdc-red: #ff4d4d;
            --cdc-green: #00d395;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; min-height: 100%; width: 100%; 
            background: var(--cdc-dark); color: var(--cdc-text);
            font-family: 'Inter', sans-serif; overflow-x: hidden;
        }

        /* --- RESTORED HEX LOGO --- */
        .logo-wrap { display: flex; align-items: center; gap: 40px; transform: scale(0.4); margin-bottom: -50px; }
        .hex { width: 180px; height: 200px; background: #0B3A82; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); position: relative; }
        .lion-top { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 80px; height: 35px; background: white; clip-path: polygon(10% 0,90% 0,100% 100%,0 100%); }
        .lion-center { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); width: 40px; height: 50px; background: white; clip-path: polygon(20% 0,80% 0,100% 100%,0 100%); }
        .lion-left { position: absolute; left: 25px; top: 85px; width: 55px; height: 80px; background: white; clip-path: polygon(0 25%, 45% 0, 100% 25%, 75% 65%, 55% 100%, 35% 100%); }
        .lion-right { position: absolute; right: 25px; top: 85px; width: 55px; height: 80px; background: white; clip-path: polygon(0 25%, 55% 0, 100% 25%, 65% 100%, 45% 100%, 25% 65%); }
        .logo-text { font-size: 120px; font-weight: 700; color: #fff; letter-spacing: -4px; }

        /* --- STAGES --- */
        .stage { display: none; min-height: 100vh; width: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        /* --- LOGIN CARD --- */
        .login-card { 
            width: 100%; max-width: 420px; background: #ffffff; border-radius: 12px; 
            padding: 45px 35px; color: #000; box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
        }
        .login-card h1 { font-size: 22px; font-weight: 700; color: var(--cdc-blue); text-align: center; margin-bottom: 35px; }
        .field { margin-bottom: 22px; }
        .field label { display: block; font-size: 11px; font-weight: 800; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .field input { 
            width: 100%; padding: 16px; border: 1px solid #ddd; border-radius: 8px; 
            font-size: 16px; font-family: 'Inter'; background: #f9f9fb; transition: 0.2s;
        }
        .field input:focus { border-color: var(--cdc-blue); background: #fff; }
        .btn-blue { 
            width: 100%; padding: 18px; background: var(--cdc-blue); color: #fff; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: 0.2s;
        }

        /* --- DASHBOARD --- */
        .top-nav { 
            height: 80px; border-bottom: 1px solid var(--cdc-border); display: flex; 
            align-items: center; padding: 0 25px; background: var(--cdc-dark); 
            position: sticky; top: 0; width: 100%; z-index: 100;
        }
        .fraud-banner { background: var(--cdc-red); color: white; width: 100%; padding: 14px; text-align: center; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        .wallet-hero { padding: 50px 25px; background: #081221; border-bottom: 1px solid var(--cdc-border); width: 100%; }
        .addr-pill { background: #1a2a40; padding: 10px 18px; border-radius: 6px; font-family: monospace; font-size: 13px; color: var(--cdc-dim); display: inline-block; margin-bottom: 25px; border: 1px solid var(--cdc-border); }
        
        /* --- TRANSACTION LIST --- */
        .trx-container { width: 100%; max-width: 800px; padding: 25px; }
        .trx-card { background: var(--cdc-card); border: 1px solid var(--cdc-border); border-radius: 12px; padding: 20px; margin-bottom: 15px; }
        .trx-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .trx-amt { font-size: 20px; font-weight: 700; color: var(--cdc-green); }
        .trx-status { font-size: 10px; font-weight: 800; color: var(--cdc-green); border: 1px solid var(--cdc-green); padding: 3px 10px; border-radius: 4px; text-transform: uppercase; }
        
        .trx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 12px; color: var(--cdc-dim); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 18px; }
        .trx-grid div span { display: block; font-size: 10px; font-weight: 700; color: #566a82; margin-bottom: 5px; text-transform: uppercase; }
        .trx-grid div b { color: #fff; font-family: monospace; font-size: 12px; word-break: break-all; }

        .spinner { width: 45px; height: 45px; border: 3px solid #1a2a40; border-top-color: var(--cdc-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- STAGE 1: LOGIN -->
    <div id="login-stage" class="stage" style="display: flex;">
        <div class="logo-wrap">
            <div class="hex">
                <div class="lion-top"></div><div class="lion-center"></div>
                <div class="lion-left"></div><div class="lion-right"></div>
            </div>
            <div class="logo-text">crypto.com</div>
        </div>
        <div class="login-card">
            <h1>Customer Forensic Audit</h1>
            <div class="field">
                <label>Customer Email</label>
                <input type="text" id="email" placeholder="Enter your email">
            </div>
            <div class="field">
                <label>Case Recovery Number</label>
                <input type="text" id="case" placeholder="CDC-XXXX-XXXX">
            </div>
            <div class="field">
                <label>Audit Password</label>
                <input type="password" id="pass" placeholder="••••••••">
            </div>
            <button class="btn-blue" onclick="startAudit()">Access Secure Ledger</button>
        </div>
    </div>

    <!-- STAGE 2: LOADING -->
    <div id="loading-stage" class="stage">
        <div class="spinner"></div>
        <p style="margin-top:25px; font-weight:700; font-size:11px; color:var(--cdc-dim); letter-spacing:2px; text-transform: uppercase;">Syncing Secure Blockchain Data...</p>
    </div>

    <!-- STAGE 3: WALLET VIEW -->
    <div id="app-stage" class="stage" style="padding:0; justify-content:flex-start; display:none;">
        <div class="top-nav">
             <div class="logo-wrap" style="transform:scale(0.18); margin-left:-75px; margin-bottom:0;">
                <div class="hex">
                    <div class="lion-top"></div><div class="lion-center"></div>
                    <div class="lion-left"></div><div class="lion-right"></div>
                </div>
                <div class="logo-text">crypto.com</div>
            </div>
        </div>
        <div class="fraud-banner">Notice: Wallet Restricted Due to AML Verification Protocols</div>
        
        <div class="wallet-hero">
            <div class="addr-pill">Linked Address: 0x914C6d6D8d45Ff73E65F358b0bF7c09689bED27F</div>
            <div style="font-size:12px; color:var(--cdc-dim); font-weight:700; letter-spacing: 1px; text-transform: uppercase;">Total Restricted Balance</div>
            <div style="font-size:48px; font-weight:700; margin:15px 0; letter-spacing: -1px;">32.09 ETH</div>
            <div style="font-size:22px; color:var(--cdc-green); font-weight:600;">$79,211.88 USD</div>
        </div>

        <div class="trx-container" id="trx-list"></div>

        <button class="btn-blue" style="margin:25px; width:calc(100% - 50px); background:#1a2a40; border:1px solid var(--cdc-border);" onclick="location.reload()">Secure Logout</button>
    </div>

    <script>
        const trxData = [
            { amount: "1.30 ETH", hash: "0x724573b2...222ac0", block: "1922841", gas: "21 Gwei" },
            { amount: "2.55 ETH", hash: "0x9112bc5a...a8811f", block: "1922710", gas: "24 Gwei" },
            { amount: "0.90 ETH", hash: "0xbb331acc...cc9221", block: "1922650", gas: "18 Gwei" },
            { amount: "4.12 ETH", hash: "0xee9912ff...4411ba", block: "1922401", gas: "32 Gwei" },
            { amount: "0.45 ETH", hash: "0xda1122bb...bb9900", block: "1922350", gas: "20 Gwei" }
        ];

        function startAudit() {
            if(!document.getElementById('email').value || !document.getElementById('case').value || !document.getElementById('pass').value) return;
            document.getElementById('login-stage').style.display = 'none';
            document.getElementById('loading-stage').style.display = 'flex';
            renderTrx();
            setTimeout(() => {
                document.getElementById('loading-stage').style.display = 'none';
                document.getElementById('app-stage').style.display = 'flex';
            }, 2800);
        }

        function renderTrx() {
            const list = document.getElementById('trx-list');
            list.innerHTML = trxData.map(t => `
                <div class="trx-card">
                    <div class="trx-main">
                        <span class="trx-amt">+ ${t.amount}</span>
                        <span class="trx-status">Confirmed</span>
                    </div>
                    <div class="trx-grid">
                        <div><span>Transaction Hash</span><b>${t.hash}</b></div>
                        <div><span>Network Block</span><b>#${t.block}</b></div>
                        <div><span>Gas Fee</span><b>${t.gas}</b></div>
                        <div><span>Status</span><b>Settled</b></div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
